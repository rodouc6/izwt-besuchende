<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1923; color: #c8d6e5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 32px 24px; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; color: #e8eef4; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #6b7f91; margin-bottom: 28px; }

  /* Statistiken */
  .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 32px; }
  .stat { background: #162030; border-radius: 10px; padding: 16px 24px; text-align: center; min-width: 120px; }
  .stat-number { font-size: 32px; font-weight: 700; color: #4a90d9; line-height: 1; }
  .stat-label { font-size: 12px; color: #6b7f91; margin-top: 4px; }

  /* Schieberegler */
  .slider-box { background: #162030; border-radius: 10px; padding: 18px 20px; margin-bottom: 24px; }
  .slider-label { font-size: 13px; color: #6b7f91; margin-bottom: 12px; display: flex; justify-content: space-between; }
  .slider-label span { color: #4a90d9; font-weight: 600; }
  .range-wrap { position: relative; height: 24px; }
  .range-wrap input[type=range] { position: absolute; width: 100%; height: 4px; top: 10px; appearance: none; background: transparent; pointer-events: none; }
  .range-wrap input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2px solid #4a90d9; box-shadow: 0 0 6px rgba(74,144,217,.4); cursor: pointer; pointer-events: all; }
  .range-wrap input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2px solid #4a90d9; cursor: pointer; pointer-events: all; }
  .track-bg { position: absolute; top: 14px; left: 0; right: 0; height: 4px; background: #2a3a4a; border-radius: 2px; }
  .track-fill { position: absolute; top: 14px; height: 4px; background: #4a90d9; border-radius: 2px; }
  .range-ticks { display: flex; justify-content: space-between; font-size: 10px; color: #3a4a5a; margin-top: 6px; padding: 0 4px; }

  /* Tag-Cloud */
  .cloud { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { padding: 5px 13px; border-radius: 16px; font-size: 13px; background: #1a2d40; color: #6ab0e8; transition: opacity .15s; }
  .tag.has-orcid { cursor: pointer; text-decoration: none; }
  .tag.has-orcid:hover { background: #1f3850; color: #8cc8f8; }
  .tag.no-orcid { opacity: 0.45; cursor: default; }
  .tag[hidden] { display: none; }

  .count { font-size: 13px; color: #4a6a82; margin-bottom: 14px; }
</style>
</head>

const STATS = {"total": 737, "events": 52, "min_year": 2005, "max_year": 2026};

// Statistiken befüllen
document.getElementById('stat-total').textContent = STATS.total.toLocaleString('de-DE') + '+';
document.getElementById('stat-years').textContent = (STATS.max_year - STATS.min_year + 1);
document.getElementById('stat-events').textContent = STATS.events;

// Tags bauen (einmalig, alphabetisch sortiert)
const sorted = [...DATA].sort((a, b) => a.name.localeCompare(b.name, 'de'));
const cloud = document.getElementById('cloud');
sorted.forEach(entry => {
  let el;
  if (entry.orcid) {
    el = document.createElement('a');
    el.href = entry.orcid;
    el.target = '_blank';
    el.rel = 'noopener noreferrer';
    el.className = 'tag has-orcid';
    el.setAttribute('aria-label', entry.name + ', ORCID-Profil öffnen');
  } else {
    el = document.createElement('span');
    el.className = 'tag no-orcid';
  }
  el.textContent = entry.name;
  el.title = entry.semester;
  el.dataset.year = entry.year;
  cloud.appendChild(el);
});

// Schieberegler initialisieren
const minYear = STATS.min_year;
const maxYear = STATS.max_year;
const rangeMin = document.getElementById('range-min');
const rangeMax = document.getElementById('range-max');
rangeMin.min = rangeMax.min = minYear;
rangeMin.max = rangeMax.max = maxYear;
rangeMin.value = minYear;
rangeMax.value = maxYear;

// Ticks (jede 5 Jahre)
const ticks = document.getElementById('ticks');
for (let y = minYear; y <= maxYear; y += 5) {
  const t = document.createElement('span');
  t.textContent = y;
  ticks.appendChild(t);
}

function updateFill() {
  const total = maxYear - minYear || 1;
  const l = (+rangeMin.value - minYear) / total * 100;
  const r = (+rangeMax.value - minYear) / total * 100;
  document.getElementById('track-fill').style.left = l + '%';
  document.getElementById('track-fill').style.width = (r - l) + '%';
}

function filterCloud() {
  const lo = +rangeMin.value;
  const hi = +rangeMax.value;
  let visible = 0;
  cloud.querySelectorAll('.tag').forEach(el => {
    const y = +el.dataset.year;
    if (y >= lo && y <= hi) {
      el.removeAttribute('hidden');
      visible++;
    } else {
      el.setAttribute('hidden', '');
    }
  });
  document.getElementById('range-label').textContent = lo + '–' + hi + ' · ' + visible + ' Personen';
  document.getElementById('count-label').textContent = visible + ' Personen im gewählten Zeitraum';
  updateFill();
}

rangeMin.addEventListener('input', () => {
  if (+rangeMin.value > +rangeMax.value) rangeMax.value = rangeMin.value;
  filterCloud();
});
rangeMax.addEventListener('input', () => {
  if (+rangeMax.value < +rangeMin.value) rangeMin.value = rangeMax.value;
  filterCloud();
});

filterCloud(); // Initialzustand
</script>
